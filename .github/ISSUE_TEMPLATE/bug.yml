name: Bug Report
description: Report a bug in opensips-deploy
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: input
    id: docker-version
    attributes:
      label: Docker version
      placeholder: "27.0.3"
  - type: input
    id: host-os
    attributes:
      label: Host OS
      placeholder: "Ubuntu 22.04 / macOS 14 / Windows 11 (WSL2)"
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
