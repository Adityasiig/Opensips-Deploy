# CI for opensips-deploy-local.
# Keep it cheap: shellcheck + hadolint are fast, docker build is the long one.
# If you add a new language/tool, gate the heavy job behind `needs:`.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck on deploy scripts
        uses: ludeeus/action-shellcheck@master
        env:
          SHELLCHECK_OPTS: -S error
        with:
          scandir: ./app
          severity: error

  hadolint:
    name: Hadolint (Dockerfile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

  php-syntax:
    name: PHP syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: Lint all PHP files
        run: |
          find app -name "*.php" -print0 | xargs -0 -n1 php -l

  docker-build:
    name: Docker build smoke-test
    runs-on: ubuntu-latest
    needs: [shellcheck, hadolint, php-syntax]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: opensips-deploy-local:ci
